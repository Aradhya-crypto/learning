<html>

<head>
    <title>
        CSS
    </title>
    <style>
        h1 {
            color: yellow;
        }
    </style>
    <style>
        * {
            
            margin: 0;
        }

        h1 {
            color: green;
        }

        .css {
            color: rgb(64, 38, 129);
            font-size: 40px;
            font-weight: 600;
            text-align: center;
            font-family: fantasy;
            padding: 20px;
            margin: 20px;
        }

        .demo {

            font-size: 20px;

            background-color: red;
        }

        #demo {
            margin-top: 20px;

            background-color: blue;
        }

        body {
            border: none;
        }

        html {
            border: none;
        }

        span {
            color: white;
            background: red;
        }

        .css_details {
            color: white;
            background: black;
            margin-top: 20px;
            height: auto;
            border:15px  red ;
            border-style:double ;
            margin:20px ;
        }

    </style>

</head>

<body>
    <h1 class="css">
        LEARNING CSS
    </h1>

    <h1 class=" demo">
        CSS
    </h1>

    <h2 id="demo">
        DEMO
    </h2>

    <!-- span  -->

    <!-- inline element - isko jitna jarurat rhta hai utna space leta hai  -->

    <span>Aradhya</span>


    <!-- div  -->
    <!-- block element - ye pura width le lega -->

    <div class="css_details">
        <h1 class="css">
            LEARNING CSS
        </h1>

        <h1 class=" demo">
            CSS
        </h1>

        <h2 id="demo">
            DEMO
        </h2>
    </div>

</body>

</html>
