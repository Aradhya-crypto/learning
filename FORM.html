<html>

<head>
  <title>Student Registration Form</title>
</head>
<style>
  * {
    background-color: rgb(116, 245, 210);
  }
  textarea, select {
    background: #fff;
  }

  input {
    background-color: white;
  }

  h1 {
    text-align-last: center;
  }
  label {
background-color: rgba(13, 162, 82, 0.811);
  }

</style>

<body>
  <h1>
    <u><em>Student Registration Form</em> </u>
  </h1>
  <form method="get">
    <label for="rollno">Roll NO:</label>
    <input class="inputtext" id="rollno" placeholder="Roll No." type="number" required />
    <br />
    <br />
    <label for="name">Student Name:</label>
    <input id="name" placeholder="first name" type="text" />
    <input id="name" placeholder="middle name(optional)" type="text" />
    <input id="name" placeholder="last name" type="text" />
    <br />
    <br />
    <label for="fathername">Father's Name:</label>
    <input id="fathername" placeholder="Father's Name" type="text" />
    <br />
    <br />
    <label for="birthdate">Date Of Birth:</label>
    <input id="birthdate" type="date" />
    <br />
    <br />
    <label for="mobile">Mobile No:</label>
    <input id="mobile" placeholder="Mobile No." type="number" />
    <br />
    <br />
    <label for="email">Email Id:</label>
    <input id="email" placeholder="Email Id" type="email" />
    <br />
    <br />
    <label for="pass">Password:</label>
    <input id="pass" placeholder="Password" min="8" max="12" type="password" />
    <br />
    <br />
    <label>Gender:</label>
    <input id="male" name="Gender" type="radio" />
    <label for="male">Male</label>
    <input id="female" name="Gender" type="radio" />
    <label for="female">Female</label>
    <br />
    <br />
    <label>Department:</label>
    <input id="cse" name="Department" type="checkbox" />
    <label for="cse">CSE</label>
    <input id="it" name="Department" type="checkbox" />
    <label for="it">IT</label>
    <input id="ece" name="Department" type="checkbox" />
    <label for="ece">ECE</label>
    <input id="civil" name="Department" type="checkbox" />
    <label for="civil">Civil</label>
    <br />
    <br />
    <label for="subject">Subject</label>
    <select name="subject" id="subject">
      <option value="">
        -----------------Select current course's---------------
      </option>
      <option value="maths">maths</option>
      <option value="">hindi</option>
      <option>english</option>
    </select>
    <br />
    <br />
    <label for="photo">Student's Photo:</label>
    <input id="photo" placeholder="Choose File" type="file" />
    <br />
    <br />
    <label for="city">City:</label>
    <input id="city" placeholder="City" type="text" />
    <br />
    <br />
    <label for="address">Address:</label>
    <textarea name="address" id="address" rows="5" cols="30"></textarea>
    <br />
    <br />
<lable for="state">State:</lable>
<input id="state" type="text">
    <br />
    <br />
    <input id="register" placeholder="Register" type="submit" value="Register" />

  </form>
</body>

</html>
